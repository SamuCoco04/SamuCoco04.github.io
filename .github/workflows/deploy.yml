name: Validate and deploy portfolio

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run quality checks and build
        run: npm run check
      - name: Store validated build
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist
          if-no-files-found: error

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Restore validated build
        uses: actions/download-artifact@v4
        with:
          name: portfolio-dist
          path: dist
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run end-to-end and accessibility tests
        run: npx playwright test
      - name: Store Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Restore validated build
        uses: actions/download-artifact@v4
        with:
          name: portfolio-dist
          path: dist
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
